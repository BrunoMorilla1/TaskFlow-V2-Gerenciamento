spring:
  application:
    name: Taskflow Gerenciamento

  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    cache: false
    check-template-location: true

  web:
    resources:
      static-locations: classpath:/static/
      add-mappings: true

  datasource:
    url: jdbc:postgresql://localhost:5432/TaskFlow-V2
    username: postgres
    password: 1234
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  mail:
    host: smtp.gmail.com
    port: 587
    username: morilla.bsm@gmail.com
    password: teste
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

